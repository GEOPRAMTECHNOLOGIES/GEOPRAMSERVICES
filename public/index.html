<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Geopram Technologies — Donate</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.4);
    }

    .logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo-icon {
      font-size: 3rem;
      display: block;
      margin-bottom: 8px;
    }

    .logo h1 {
      font-size: 1.5rem;
      color: #1a1a2e;
      font-weight: 700;
    }

    .logo p {
      color: #888;
      font-size: 0.9rem;
      margin-top: 4px;
    }

    .divider {
      border: none;
      border-top: 1px solid #eee;
      margin: 24px 0;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: #555;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e8e8e8;
      border-radius: 10px;
      font-size: 1rem;
      color: #333;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    input:focus {
      border-color: #4CAF50;
      box-shadow: 0 0 0 3px rgba(76,175,80,0.15);
    }

    .hint {
      font-size: 0.78rem;
      color: #aaa;
      margin-top: 5px;
    }

    .amounts {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .amount-btn {
      flex: 1;
      min-width: 70px;
      padding: 10px;
      border: 2px solid #e8e8e8;
      border-radius: 8px;
      background: white;
      color: #555;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .amount-btn:hover, .amount-btn.active {
      border-color: #4CAF50;
      background: #f1f8e9;
      color: #2e7d32;
    }

    .donate-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #4CAF50, #43a047);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.3px;
      margin-top: 8px;
    }

    .donate-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(76,175,80,0.4);
    }

    .donate-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
    }

    #status {
      margin-top: 16px;
      padding: 14px;
      border-radius: 10px;
      font-size: 0.92rem;
      text-align: center;
      display: none;
      font-weight: 500;
    }

    .success {
      background: #e8f5e9;
      color: #2e7d32;
      border: 1px solid #a5d6a7;
      display: block !important;
    }

    .error {
      background: #ffebee;
      color: #c62828;
      border: 1px solid #ef9a9a;
      display: block !important;
    }

    .mpesa-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 20px;
      color: #aaa;
      font-size: 0.8rem;
    }

    .mpesa-badge span {
      color: #4CAF50;
      font-weight: 700;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <span class="logo-icon">🎁</span>
      <h1>Geopram Technologies</h1>
      <p>Support our mission with a donation</p>
    </div>

    <hr class="divider"/>

    <div class="form-group">
      <label for="phone">M-Pesa Phone Number</label>
      <input
        type="tel"
        id="phone"
        placeholder="254712345678"
        maxlength="12"
      />
      <div class="hint">Format: 254 followed by 9 digits</div>
    </div>

    <label>Quick Amount (KES)</label>
    <div class="amounts">
      <div class="amount-btn" onclick="setAmount(50)">50</div>
      <div class="amount-btn" onclick="setAmount(100)">100</div>
      <div class="amount-btn" onclick="setAmount(500)">500</div>
      <div class="amount-btn" onclick="setAmount(1000)">1,000</div>
    </div>

    <div class="form-group">
      <label for="amount">Or Enter Amount (KES)</label>
      <input
        type="number"
        id="amount"
        placeholder="Enter amount"
        min="1"
      />
    </div>

    <button class="donate-btn" id="btn" onclick="donate()">
      💚 Donate via M-Pesa
    </button>

    <div id="status"></div>

    <div class="mpesa-badge">
      🔒 Secured by <span>M-Pesa</span> · Safaricom
    </div>
  </div>

  <script>
    function setAmount(val) {
      document.getElementById('amount').value = val;
      document.querySelectorAll('.amount-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
    }

    async function donate() {
      const phone = document.getElementById('phone').value.trim();
      const amount = document.getElementById('amount').value.trim();
      const btn = document.getElementById('btn');
      const status = document.getElementById('status');

      // Reset
      status.className = '';
      status.style.display = 'none';

      // Validate
      if (!phone) {
        showStatus('Please enter your M-Pesa phone number.', 'error');
        return;
      }
      if (!phone.startsWith('254') || phone.length !== 12) {
        showStatus('Phone must start with 254 and be 12 digits. E.g. 254712345678', 'error');
        return;
      }
      if (!amount || parseInt(amount) < 1) {
        showStatus('Please enter a valid amount.', 'error');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Sending prompt...';

      try {
        const res = await fetch('/api/stk_push', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone, amount: parseInt(amount) })
        });

        const data = await res.json();
        console.log('Response:', data);

        if (data.ResponseCode === '0') {
          showStatus('✅ M-Pesa prompt sent! Check your phone and enter your PIN.', 'success');
        } else if (data.error) {
          showStatus('❌ ' + data.error + (data.details ? ': ' + JSON.stringify(data.details) : ''), 'error');
        } else {
          showStatus('❌ ' + (data.errorMessage || data.ResponseDescription || JSON.stringify(data)), 'error');
        }

      } catch (e) {
        showStatus('❌ ' + e.message, 'error');
      }

      btn.disabled = false;
      btn.innerHTML = '💚 Donate via M-Pesa';
    }

    function showStatus(msg, type) {
      const status = document.getElementById('status');
      status.textContent = msg;
      status.className = type;
    }
  </script>
</body>
</html>
